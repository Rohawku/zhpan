version: v0.3

prompts:
  path: data/prompts/v0.3.jsonl       # AlignBench v1.1, 150 prompts

# ─── 中文 frontier generators (same as v0.2) ──────────────
generators:
  - name: qwen-max
    vendor: dashscope
    model: qwen-max-2025-01-25
    params:
      temperature: 0.7
      max_tokens: 1536

  - name: deepseek-chat
    vendor: deepseek
    model: deepseek-chat
    params:
      temperature: 0.7
      max_tokens: 1536

  - name: glm-4-plus
    vendor: zhipu
    model: glm-4-plus
    params:
      temperature: 0.7
      max_tokens: 1536

  - name: doubao-pro-32k
    vendor: doubao
    model: doubao-1-5-pro-32k-250115
    params:
      temperature: 0.7
      max_tokens: 1536

# ─── 5 judges: 3 tested + 2 independent anchors ────────────
judges:
  - name: qwen-max-judge
    vendor: dashscope
    model: qwen-max-2025-01-25
    params:
      temperature: 0.0
      max_tokens: 400

  - name: deepseek-chat-judge
    vendor: deepseek
    model: deepseek-chat
    params:
      temperature: 0.0
      max_tokens: 400

  - name: glm-4-plus-judge
    vendor: zhipu
    model: glm-4-plus
    params:
      temperature: 0.0
      max_tokens: 400

  - name: kimi-anchor-judge
    vendor: moonshot
    model: moonshot-v1-32k
    params:
      temperature: 0.0
      max_tokens: 400

  # ─── Second independent anchor: 百度文心 ERNIE-4.0 ──
  - name: ernie-anchor-judge
    vendor: qianfan
    model: ernie-4.0-8k
    params:
      temperature: 0.0
      max_tokens: 400

# Primary anchor for the v0.3 leaderboard.
# anchor_compare.py cross-validates Kimi vs ERNIE after the run.
anchor_judge: ernie-anchor-judge

generation:
  output_dir: data/generations/v0.3
  concurrency: 5
  cache: true

judging:
  output_dir: data/judgments/v0.3
  concurrency: 5
  cache: true

cache_root: data/cache

budget:
  max_usd: 30
